name: Deploy Backend to EC2 from ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: abc1234 or latest)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync deployment files to EC2
        run: |
          rsync -avz -e "ssh -i ~/.ssh/ec2_key.pem" \
            docker-compose.ecr.yml \
            deploy/deploy-from-ecr.sh \
            "$EC2_USER@$EC2_HOST:~/placement-management-system/"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem "$EC2_USER@$EC2_HOST" << 'EOF'
            set -euo pipefail
            cd ~/placement-management-system
            chmod +x deploy-from-ecr.sh
            AWS_REGION='${{ env.AWS_REGION }}' \
            ECR_REGISTRY='${{ env.ECR_REGISTRY }}' \
            ECR_BACKEND_REPO='${{ env.ECR_BACKEND_REPO }}' \
            IMAGE_TAG='${{ github.event.inputs.image_tag }}' \
            ./deploy-from-ecr.sh
          EOF
