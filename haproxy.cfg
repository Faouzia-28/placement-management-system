global
    maxconn 10000
    log stdout local0
    tune.bufsize 65536
    tune.http.maxhdr 16384

defaults
    mode http
    timeout connect 10000
    timeout client 300000
    timeout server 300000
    log global
    option httplog
    retries 0

frontend http_front
    bind *:80
    default_backend backend_servers
    option http-server-close
    
backend backend_servers
    balance roundrobin
    server backend backend:5000 check



